spring:
  datasource:
    url: jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:db_cocoaromas};encrypt=${DB_ENCRYPT:false};trustServerCertificate=true
    username: ${DB_USERNAME:sv_cocoaromas}
    password: ${DB_PASSWORD:ApiUser123!}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        '[format_sql]': true
  flyway:
    enabled: true
    baseline-on-migrate: true
  sql:
    init:
      mode: never

logging:
  level:
    '[org.hibernate.SQL]': warn
