services:
  cocoaromas-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cocoaromas-api
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      DB_HOST: host.docker.internal
      DB_PORT: 1433
      DB_NAME: db_cocoaromas
      DB_USERNAME: sa
      DB_PASSWORD: YourStrong!Passw0rd
      DB_ENCRYPT: "false"
    ports:
      - "8080:8080"
    restart: unless-stopped
